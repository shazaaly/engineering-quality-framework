# Monorepo layout:
# - Toolkit + eslint-plugin live at repo root (npm ci here).
# - test-repo/ is the in-repo Nest sample governed by the same eslint.config.js rules.
#
# Flow (matches plan.md + standards/engineering-handbook.md Definition of Done):
# 1) quality — must pass before merge (lint, naming, TSDoc, semantic rules on test-repo/src).
# 2) documentation — runs only after quality succeeds: Compodoc API docs from TSDoc + copy of engineering handbook for policy traceability.
name: quality-gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install (root toolkit + test-repo for consistent resolution)
        run: |
          npm ci
          npm ci --prefix test-repo

      - name: Quality gates (test-repo — same as npm run demo:check)
        run: npm run demo:check

  documentation:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: |
          npm ci
          npm ci --prefix test-repo

      - name: Generate documentation (Compodoc + handbook copy)
        run: npm run docs:generate

      - name: Upload documentation artifact
        uses: actions/upload-artifact@v4
        with:
          name: governed-nest-docs
          path: docs/
          if-no-files-found: error

